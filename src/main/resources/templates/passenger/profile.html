<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Hồ sơ cá nhân — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{common/layout :: sidebar('profile')}"></div>
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <div class="main-content">
    <div class="topbar">
      <button id="sidebarToggle" class="sidebar-toggle">☰</button>
      <span class="topbar-title">👤 Hồ sơ cá nhân</span>
    </div>

    <div class="page-content" style="max-width:720px">
      <div th:if="${success}" class="alert alert-success" data-auto-dismiss="4000" style="margin-bottom:20px">
        ✅ <span th:text="${success}">Thành công</span>
      </div>
      <div th:if="${error}" class="alert alert-danger" data-auto-dismiss="5000" style="margin-bottom:20px">
        ❌ <span th:text="${error}">Lỗi</span>
      </div>

      <!-- Profile card -->
      <div class="card" style="margin-bottom:20px">
        <div style="background:linear-gradient(135deg,var(--primary),var(--secondary));padding:32px;text-align:center">
          <div style="width:80px;height:80px;background:rgba(255,255,255,.2);border-radius:50%;
                      display:flex;align-items:center;justify-content:center;font-size:2rem;
                      margin:0 auto 12px;font-weight:800;color:#fff;border:3px solid rgba(255,255,255,.4)"
               th:text="${#strings.substring(user.fullName,0,1)}">A</div>
          <div style="color:#fff;font-size:1.2rem;font-weight:800" th:text="${user.fullName}">Tên</div>
          <div style="color:rgba(255,255,255,.8);font-size:.85rem;margin-top:4px" th:text="'@' + ${user.username}">user</div>
          <div style="margin-top:8px"><span class="badge" style="background:rgba(255,255,255,.2);color:#fff">Hành khách</span></div>
        </div>
        <div class="card-body">
          <div class="grid-2" style="gap:16px;margin-bottom:4px">
            <div>
              <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:2px">Ngày tham gia</div>
              <div style="font-weight:600" th:text="${#temporals.format(user.createdAt,'dd/MM/yyyy')}">01/01/2024</div>
            </div>
            <div>
              <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:2px">Trạng thái</div>
              <span th:if="${user.enabled}" class="badge badge-paid">✅ Hoạt động</span>
              <span th:unless="${user.enabled}" class="badge badge-cancelled">❌ Bị khóa</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit form -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header">✏️ Cập nhật thông tin</div>
        <div class="card-body">
          <form th:action="@{/passenger/profile}" th:object="${profileRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="grid-2" style="gap:16px">
              <div class="form-group">
                 <label class="form-label">Họ và tên *</label>
                 <input type="text" th:field="*{fullName}" class="form-control"/>
               </div>
               <div class="form-group">
                 <label class="form-label">Số điện thoại *</label>
                 <input type="tel" th:field="*{phone}" class="form-control"/>
               </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control"/>
              </div>
              <div class="form-group">
                <label class="form-label">Địa chỉ</label>
                <input type="text" th:field="*{address}" class="form-control"/>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">💾 Lưu thay đổi</button>
          </form>
        </div>
      </div>

      <!-- Change password -->
      <div class="card">
        <div class="card-header">🔒 Đổi mật khẩu</div>
        <div class="card-body">
          <form id="changePasswordForm">
            <div class="form-group">
              <label class="form-label">Mật khẩu hiện tại</label>
              <input type="password" id="oldPassword" class="form-control" placeholder="••••••••"/>
            </div>
            <div class="grid-2" style="gap:16px">
              <div class="form-group">
                <label class="form-label">Mật khẩu mới</label>
                <input type="password" id="newPassword" class="form-control" placeholder="Tối thiểu 6 ký tự"/>
              </div>
              <div class="form-group">
                <label class="form-label">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Nhập lại"/>
              </div>
            </div>
            <button type="submit" class="btn btn-warning">🔑 Đổi mật khẩu</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
