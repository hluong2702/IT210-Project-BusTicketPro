<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Vé của tôi — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{common/layout :: sidebar('tickets')}"></div>
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <div class="main-content">
    <div class="topbar">
      <button id="sidebarToggle" class="sidebar-toggle">☰</button>
      <span class="topbar-title">🎫 Vé của tôi</span>
      <div class="topbar-actions">
        <a th:href="@{/}" class="btn btn-primary btn-sm">🔍 Đặt vé mới</a>
      </div>
    </div>

    <div class="page-content">
      <!-- Filter tabs -->
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        <a th:href="@{/passenger/tickets}" class="btn btn-sm"
           th:classappend="${filterStatus == null} ? ' btn-primary' : ' btn-ghost'">Tất cả</a>
        <a th:href="@{/passenger/tickets(status=PENDING)}" class="btn btn-sm"
           th:classappend="${filterStatus == 'PENDING'} ? ' btn-primary' : ' btn-ghost'">⏳ Chờ TT</a>
        <a th:href="@{/passenger/tickets(status=PAID)}" class="btn btn-sm"
           th:classappend="${filterStatus == 'PAID'} ? ' btn-success' : ' btn-ghost'">✅ Đã TT</a>
        <a th:href="@{/passenger/tickets(status=CANCELLED)}" class="btn btn-sm"
           th:classappend="${filterStatus == 'CANCELLED'} ? ' btn-danger' : ' btn-ghost'">❌ Đã hủy</a>
      </div>

      <div th:if="${#lists.isEmpty(tickets)}" class="empty-state card">
        <div class="icon">🎫</div>
        <h3>Không có vé nào</h3>
        <p>Chưa có vé với trạng thái này</p>
      </div>

      <!-- Ticket list -->
      <div th:each="ticket : ${tickets}">
        <div class="ticket-card">
          <div class="ticket-header">
            <div>
              <div style="font-size:.72rem;opacity:.7;text-transform:uppercase">Mã vé</div>
              <div class="ticket-code" th:text="${ticket.ticketCode}">BTP</div>
            </div>
            <div style="text-align:right">
              <span th:if="${ticket.status.name() == 'PENDING'}"  class="badge badge-pending">⏳ Chờ thanh toán</span>
              <span th:if="${ticket.status.name() == 'PAID'}"     class="badge badge-paid">✅ Đã thanh toán</span>
              <span th:if="${ticket.status.name() == 'CANCELLED'}"class="badge badge-cancelled">❌ Đã hủy</span>
              <div style="font-size:.75rem;margin-top:6px;opacity:.7"
                   th:text="'Đặt: ' + ${#temporals.format(ticket.bookedAt,'HH:mm dd/MM/yy')}"></div>
            </div>
          </div>
          <div class="ticket-body">
            <div class="ticket-route">
              <div class="ticket-city" th:text="${ticket.departureName}">HN</div>
              <div style="flex:1;height:2px;background:linear-gradient(90deg,var(--primary-light),var(--secondary));margin:0 12px;position:relative">
                <span style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:1rem">✈️</span>
              </div>
              <div class="ticket-city" th:text="${ticket.arrivalName}">HCM</div>
            </div>
            <div class="ticket-info-grid">
              <div class="ticket-info-item">
                <div class="label">Giờ đi</div>
                <div class="value" th:text="${#temporals.format(ticket.departureTime,'HH:mm dd/MM')}">06:00</div>
              </div>
              <div class="ticket-info-item">
                <div class="label">Ghế số</div>
                <div class="value" th:text="${ticket.seatNumber + (ticket.seatFloor > 1 ? ' (T'+ticket.seatFloor+')' : '')}">A01</div>
              </div>
              <div class="ticket-info-item">
                <div class="label">Biển số xe</div>
                <div class="value" th:text="${ticket.licensePlate}">51B</div>
              </div>
              <div class="ticket-info-item">
                <div class="label">Loại xe</div>
                <div class="value" th:text="${ticket.busType}">Limousine</div>
              </div>
              <div class="ticket-info-item">
                <div class="label">Tài xế</div>
                <div class="value" th:text="${ticket.driverName ?: '—'}">Nguyễn A</div>
              </div>
              <div class="ticket-info-item">
                <div class="label">Tổng tiền</div>
                <div class="value" style="color:var(--primary);font-size:1rem"
                     th:text="${#numbers.formatDecimal(ticket.totalAmount,0,'COMMA',0,'POINT')} + ' đ'">450,000 đ</div>
              </div>
            </div>
            <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
              <a th:href="@{/passenger/ticket/{id}(id=${ticket.id})}" class="btn btn-ghost btn-sm">📋 Chi tiết</a>
              <button th:if="${ticket.canCancel}"
                      class="btn btn-danger btn-sm"
                      th:onclick="|cancelTicket(${ticket.id}, '/passenger/ticket/${ticket.id}/cancel', true)|">
                ❌ Hủy vé
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{common/layout :: confirmModal}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
