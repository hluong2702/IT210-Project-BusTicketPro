<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sửa xe — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{common/layout :: sidebar('buses')}"></div>
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>
  <div class="main-content">
    <div class="topbar">
      <button id="sidebarToggle" class="sidebar-toggle">☰</button>
      <span class="topbar-title">✏️ Sửa thông tin xe</span>
      <div class="topbar-actions">
        <a th:href="@{/admin/buses}" class="btn btn-ghost btn-sm">← Quay lại</a>
      </div>
    </div>
    <div class="page-content" style="max-width:640px">
      <div class="card">
        <div class="card-header">🚌 Sửa xe: <span th:text="${bus.licensePlate}">51B</span></div>
        <div class="card-body">
          <form th:action="@{/admin/buses/{id}/edit(id=${bus.id})}" th:object="${busRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="grid-2" style="gap:14px">
              <div class="form-group">
                 <label class="form-label">Biển số xe *</label>
                 <input type="text" th:field="*{licensePlate}" class="form-control"/>
               </div>
                <div class="form-group">
                  <label class="form-label">Loại xe *</label>
                  <select th:field="*{busType}" class="form-control">
                    <option th:each="type : ${busTypes}" th:value="${type.name()}" th:text="${type.displayName}">Loại</option>
                  </select>
                </div>
               <div class="form-group">
                 <label class="form-label">Hãng xe *</label>
                 <input type="text" th:field="*{company}" class="form-control"/>
               </div>
              <div class="form-group">
                <label class="form-label">Màu xe</label>
                <input type="text" th:field="*{color}" class="form-control"/>
              </div>
              <div class="form-group">
                <label class="form-label">Tài xế</label>
                <input type="text" th:field="*{driverName}" class="form-control"/>
              </div>
              <div class="form-group">
                <label class="form-label">SĐT tài xế</label>
                <input type="tel" th:field="*{driverPhone}" class="form-control"/>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Tiện ích</label>
              <input type="text" th:field="*{amenities}" class="form-control"/>
            </div>
            <div style="display:flex;gap:10px;margin-top:8px">
              <button type="submit" class="btn btn-primary">💾 Lưu thay đổi</button>
              <a th:href="@{/admin/buses}" class="btn btn-ghost">Hủy</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
