<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng ký — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center;
           background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e40af 100%); padding:20px; }
    .auth-card { background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,.25);
                 width:100%; max-width:480px; overflow:hidden; }
    .auth-header { background:linear-gradient(135deg,#4f46e5,#06b6d4); padding:28px 40px 22px;
                   text-align:center; color:#fff; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-header">
    <div style="font-size:2rem;margin-bottom:6px">🚌</div>
    <h1 style="font-size:1.4rem;margin-bottom:2px">Tạo tài khoản mới</h1>
    <p style="opacity:.85;font-size:.875rem">BusTicketPro — Đặt vé xe liên tỉnh</p>
  </div>
  <div style="padding:28px 36px 32px">
    <div th:if="${error}" class="alert alert-danger" style="margin-bottom:16px">
      <span>❌</span> <span th:text="${error}">Lỗi</span>
    </div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="grid-2" style="gap:14px">
        <div class="form-group">
          <label class="form-label">👤 Tên đăng nhập *</label>
          <input type="text" th:field="*{username}" class="form-control"
                 th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'"
                 placeholder="4-50 ký tự" autofocus/>
          <div class="invalid-feedback" th:errors="*{username}"></div>
        </div>
        <div class="form-group">
          <label class="form-label">📋 Họ và tên *</label>
          <input type="text" th:field="*{fullName}" class="form-control"
                 th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid'"
                 placeholder="Nguyễn Văn A"/>
          <div class="invalid-feedback" th:errors="*{fullName}"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">📧 Email *</label>
        <input type="email" th:field="*{email}" class="form-control"
               th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
               placeholder="email@example.com"/>
        <div class="invalid-feedback" th:errors="*{email}"></div>
      </div>

      <div class="form-group">
        <label class="form-label">📱 Số điện thoại *</label>
        <input type="tel" th:field="*{phone}" class="form-control"
               th:classappend="${#fields.hasErrors('phone')} ? ' is-invalid'"
               placeholder="0912345678"/>
        <div class="invalid-feedback" th:errors="*{phone}"></div>
      </div>

      <div class="grid-2" style="gap:14px">
        <div class="form-group">
          <label class="form-label">🔒 Mật khẩu *</label>
          <input type="password" th:field="*{password}" class="form-control"
                 th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                 placeholder="Tối thiểu 6 ký tự"/>
          <div class="invalid-feedback" th:errors="*{password}"></div>
        </div>
        <div class="form-group">
          <label class="form-label">🔒 Xác nhận mật khẩu *</label>
          <input type="password" th:field="*{confirmPassword}" class="form-control"
                 placeholder="Nhập lại mật khẩu"/>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">
        🚀 Tạo tài khoản
      </button>
    </form>

    <div style="text-align:center;margin-top:16px;font-size:.9rem">
      Đã có tài khoản? <a th:href="@{/auth/login}" style="font-weight:700">Đăng nhập</a>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
