<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center;
           background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e40af 100%); padding:20px; }
    .auth-card { background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,.25);
                 width:100%; max-width:440px; overflow:hidden; }
    .auth-header { background:linear-gradient(135deg,#4f46e5,#06b6d4); padding:36px 40px 28px;
                   text-align:center; color:#fff; }
    .auth-header .logo { font-size:2.5rem; margin-bottom:8px; }
    .auth-header h1 { font-size:1.5rem; margin-bottom:4px; }
    .auth-header p  { opacity:.85; font-size:.9rem; }
    .auth-body { padding:32px 40px 36px; }
    .divider { text-align:center; color:var(--text-muted); font-size:.8rem; margin:16px 0;
               position:relative; }
    .divider::before,.divider::after { content:''; position:absolute; top:50%;
                                       width:42%; height:1px; background:var(--border); }
    .divider::before { left:0; } .divider::after { right:0; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-header">
    <div class="logo">🚌</div>
    <h1>Chào mừng trở lại!</h1>
    <p>Đăng nhập để tiếp tục</p>
  </div>
  <div class="auth-body">
    <div th:if="${error}" class="alert alert-danger" data-auto-dismiss="5000">
      <span>❌</span> <span th:text="${error}">Sai thông tin đăng nhập</span>
    </div>
    <div th:if="${message}" class="alert alert-success" data-auto-dismiss="4000">
      <span>✅</span> <span th:text="${message}">Đăng xuất thành công</span>
    </div>

    <form th:action="@{/auth/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
         <label class="form-label">👤 Tên đăng nhập</label>
         <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" autofocus/>
       </div>
       <div class="form-group">
         <label class="form-label">🔒 Mật khẩu</label>
         <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu"/>
       </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:6px;font-size:.875rem;cursor:pointer">
          <input type="checkbox" name="remember-me" style="accent-color:var(--primary)"/> Ghi nhớ đăng nhập
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">🚀 Đăng nhập</button>
    </form>

    <div class="divider">hoặc</div>

    <div style="text-align:center;font-size:.9rem">
      Chưa có tài khoản?
      <a th:href="@{/auth/register}" style="font-weight:700">Đăng ký ngay</a>
    </div>
    <div style="text-align:center;margin-top:12px">
      <a th:href="@{/}" style="font-size:.85rem;color:var(--text-muted)">← Về trang chủ</a>
    </div>

    <!-- Demo accounts hint -->
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
