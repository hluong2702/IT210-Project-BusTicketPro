<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tra cứu vé — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body style="background:var(--bg);min-height:100vh">
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}"><div class="brand-icon">🚌</div> BusTicketPro</a>
  <div class="navbar-links">
    <a th:href="@{/}" class="nav-link-pub">Trang chủ</a>
    <a th:href="@{/ticket/lookup}" class="nav-link-pub active">Tra cứu vé</a>
    <div sec:authorize="isAuthenticated()">
      <a th:href="@{/dashboard}" class="btn btn-primary btn-sm">🏠 Tài khoản</a>
    </div>
    <div sec:authorize="isAnonymous()">
      <a th:href="@{/auth/login}" class="nav-link-pub">Đăng nhập</a>
      <a th:href="@{/auth/register}" class="btn btn-primary btn-sm">Đăng ký</a>
    </div>
  </div>
</nav>

<div style="max-width:680px;margin:48px auto;padding:0 20px">
  <div style="text-align:center;margin-bottom:36px">
    <div style="font-size:3rem;margin-bottom:12px">🔍</div>
    <h1 style="font-size:1.8rem">Tra cứu vé xe</h1>
    <p style="color:var(--text-muted);margin-top:6px">Nhập mã vé và số điện thoại để xem thông tin vé của bạn</p>
  </div>

  <div class="card" style="margin-bottom:24px">
    <div class="card-body">
      <form id="lookupForm">
        <div class="grid-2" style="gap:16px;margin-bottom:16px">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">🎫 Mã vé</label>
            <input type="text" id="lookupCode" class="form-control"
                   placeholder="VD: BTP1234567" autocomplete="off"
                   style="font-family:monospace;font-size:1rem;letter-spacing:.05em"/>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">📱 Số điện thoại đặt vé</label>
            <input type="tel" id="lookupPhone" class="form-control"
                   placeholder="VD: 0912345678"/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">
          🔍 Tra cứu vé
        </button>
      </form>
    </div>
  </div>

  <!-- Result area -->
  <div id="lookupResult" class="d-none"></div>

  <!-- Info box -->
  <div class="alert alert-info" style="margin-top:20px">
    <span>ℹ️</span>
    <div>
      <strong>Hướng dẫn:</strong> Mã vé được gửi qua email khi bạn đặt vé thành công,
      hoặc bạn có thể xem trong mục <strong>Vé của tôi</strong> sau khi đăng nhập.
    </div>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
