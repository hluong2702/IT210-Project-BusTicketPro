<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kết quả thanh toán — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body style="background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
<div style="max-width:500px;width:100%;text-align:center">

  <!-- Success -->
  <div th:if="${success}" class="card" style="overflow:hidden">
    <div style="background:linear-gradient(135deg,#ecfdf5,#d1fae5);padding:48px 24px">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#10b981,#059669);border-radius:50%;
                  display:flex;align-items:center;justify-content:center;font-size:2.5rem;
                  margin:0 auto 20px;box-shadow:0 8px 24px rgba(16,185,129,.4)">✅</div>
      <h2 style="color:#065f46;font-size:1.6rem">Thanh toán thành công!</h2>
      <p style="color:#047857;margin-top:8px">VNPay đã xác nhận giao dịch của bạn</p>
      <div style="margin-top:20px;background:rgba(255,255,255,.7);border-radius:12px;padding:16px;display:inline-block">
        <div style="font-size:.75rem;color:#065f46;opacity:.7">MÃ VÉ</div>
        <div style="font-family:monospace;font-size:1.4rem;font-weight:800;color:#059669;letter-spacing:.08em"
             th:text="${ticketCode}">BTP1234567</div>
      </div>
    </div>
    <div class="card-footer" style="display:flex;gap:12px;justify-content:center">
      <a th:href="@{/passenger/tickets}" class="btn btn-primary">🎫 Xem vé của tôi</a>
      <a th:href="@{/}" class="btn btn-ghost">🏠 Trang chủ</a>
    </div>
  </div>

  <!-- Failure -->
  <div th:unless="${success}" class="card" style="overflow:hidden">
    <div style="background:linear-gradient(135deg,#fef2f2,#fecaca);padding:48px 24px">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#ef4444,#dc2626);border-radius:50%;
                  display:flex;align-items:center;justify-content:center;font-size:2.5rem;
                  margin:0 auto 20px;box-shadow:0 8px 24px rgba(239,68,68,.4)">❌</div>
      <h2 style="color:#991b1b;font-size:1.6rem">Thanh toán thất bại</h2>
      <p style="color:#b91c1c;margin-top:8px" th:text="${error}">Giao dịch không thành công. Vui lòng thử lại.</p>
    </div>
    <div class="card-footer" style="display:flex;gap:12px;justify-content:center">
      <a th:href="@{/passenger/tickets}" class="btn btn-warning">🎫 Xem vé của tôi</a>
      <a th:href="@{/}" class="btn btn-ghost">🏠 Trang chủ</a>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
