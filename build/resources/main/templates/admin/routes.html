<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tuyến đường — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{common/layout :: sidebar('routes')}"></div>
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>
  <div class="main-content">
    <div class="topbar">
      <button id="sidebarToggle" class="sidebar-toggle">☰</button>
      <span class="topbar-title">🗺️ Tuyến đường</span>
    </div>
    <div class="page-content">
      <div class="grid-2" style="gap:24px;align-items:start">
        <!-- Routes -->
        <div class="card">
          <div class="card-header">🗺️ Danh sách tuyến đường (<span th:text="${#lists.size(routes)}">0</span>)</div>
          <div class="card-body" style="padding:0">
            <div th:if="${#lists.isEmpty(routes)}" class="empty-state" style="padding:40px">
              <p>Chưa có tuyến đường nào</p>
            </div>
            <table th:unless="${#lists.isEmpty(routes)}" class="table">
              <thead>
                <tr>
                  <th>Điểm đi</th>
                  <th>Điểm đến</th>
                  <th>Khoảng cách</th>
                  <th>Thời gian</th>
                  <th>Giá cơ bản</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="route : ${routes}">
                  <td th:text="${route.departureLocation.name}">HN</td>
                  <td th:text="${route.arrivalLocation.name}">HCM</td>
                  <td th:text="${route.distanceKm} + ' km'">1726 km</td>
                  <td th:text="${route.durationMinutes / 60} + 'h' + (${route.durationMinutes % 60} > 0 ? ${route.durationMinutes % 60} + 'm' : '')">30h</td>
                  <td style="color:var(--primary);font-weight:700"
                      th:text="${#numbers.formatDecimal(route.basePrice,0,'COMMA',0,'POINT')} + ' đ'">450,000 đ</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Locations -->
        <div class="card">
          <div class="card-header">📍 Điểm dừng (<span th:text="${#lists.size(locations)}">0</span>)</div>
          <div class="card-body" style="padding:0">
            <table class="table">
              <thead><tr><th>Tên</th><th>Tỉnh/TP</th><th>Địa chỉ</th></tr></thead>
              <tbody>
                <tr th:each="loc : ${locations}">
                  <td><strong th:text="${loc.name}">HN</strong></td>
                  <td th:text="${loc.province}">Hà Nội</td>
                  <td style="font-size:.8rem;color:var(--text-muted)" th:text="${loc.address ?: '—'}">Bến xe</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
