<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Quản lý xe — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{common/layout :: sidebar('buses')}"></div>
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <div class="main-content">
    <div class="topbar">
      <button id="sidebarToggle" class="sidebar-toggle">☰</button>
      <span class="topbar-title">🚌 Quản lý xe</span>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" data-modal-open="addBusModal">+ Thêm xe</button>
      </div>
    </div>

    <div class="page-content">
      <div th:if="${success}" class="alert alert-success" data-auto-dismiss="4000" style="margin-bottom:16px">
        ✅ <span th:text="${success}">Thành công</span>
      </div>
      <div th:if="${error}" class="alert alert-danger" data-auto-dismiss="5000" style="margin-bottom:16px">
        ❌ <span th:text="${error}">Lỗi</span>
      </div>

      <div class="card">
        <div class="card-header">
          <span>Danh sách xe (<span th:text="${#lists.size(buses)}">0</span> xe)</span>
          <input type="text" class="form-control" style="max-width:200px" placeholder="🔍 Tìm..." data-table-search="busTable"/>
        </div>
        <div class="card-body" style="padding:0">
          <div th:if="${#lists.isEmpty(buses)}" class="empty-state">
            <div class="icon">🚌</div>
            <h3>Chưa có xe nào</h3>
            <button class="btn btn-primary" data-modal-open="addBusModal" style="margin-top:12px">+ Thêm xe đầu tiên</button>
          </div>
          <div th:unless="${#lists.isEmpty(buses)}" class="table-wrapper">
            <table class="table" id="busTable">
              <thead>
              <tr>
                <th>Biển số</th>
                <th>Loại xe</th>
                <th>Chỗ ngồi</th>
                <th>Hãng xe</th>
                <th>Tài xế</th>
                <th>SĐT tài xế</th>
                <th>Tiện ích</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="bus : ${buses}">
                <td><strong th:text="${bus.licensePlate}">51B</strong></td>
                <td th:text="${bus.busType.displayName}">Limousine</td>
                <td><span class="badge badge-info" th:text="${bus.totalSeats} + ' chỗ'">20</span></td>
                <td th:text="${bus.company}">Phương Trang</td>
                <td th:text="${bus.driverName ?: '—'}">Nguyễn A</td>
                <td th:text="${bus.driverPhone ?: '—'}">0901</td>
                <td style="max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
                    th:text="${bus.amenities ?: '—'}">WiFi</td>
                <td>
                  <span th:if="${bus.active}" class="badge badge-paid">✅ Hoạt động</span>
                  <span th:unless="${bus.active}" class="badge badge-cancelled">❌ Ngừng</span>
                </td>
                <td style="white-space:nowrap">
                  <a th:href="@{/admin/buses/{id}/edit(id=${bus.id})}" class="btn btn-ghost btn-sm">✏️ Sửa</a>
                  <button class="btn btn-danger btn-sm"
                          th:data-url="@{/admin/buses/{id}/delete(id=${bus.id})}"
                          th:data-message="'Xóa xe ' + ${bus.licensePlate} + '?'"
                          onclick="deleteItem(this.dataset.url, this.dataset.message)">
                    🗑️
                  </button>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Bus Modal -->
<div id="addBusModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🚌 Thêm xe mới</div>
      <button class="modal-close" data-modal-close="addBusModal">×</button>
    </div>
    <form th:action="@{/admin/buses}" th:object="${busRequest}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="modal-body">
        <div class="grid-2" style="gap:14px">
          <div class="form-group">
             <label class="form-label">Biển số xe *</label>
             <input type="text" th:field="*{licensePlate}" class="form-control" placeholder="51B-12345"/>
             <div class="invalid-feedback" th:errors="*{licensePlate}"></div>
           </div>
           <div class="form-group">
             <label class="form-label">Loại xe *</label>
             <select th:field="*{busType}" class="form-control">
               <option value="">-- Chọn loại xe --</option>
               <option th:each="type : ${busTypes}" th:value="${type.name()}" th:text="${type.displayName}">Loại</option>
             </select>
           </div>
           <div class="form-group">
             <label class="form-label">Hãng xe *</label>
             <input type="text" th:field="*{company}" class="form-control" placeholder="Phương Trang"/>
           </div>
          <div class="form-group">
            <label class="form-label">Màu xe</label>
            <input type="text" th:field="*{color}" class="form-control" placeholder="Trắng"/>
          </div>
          <div class="form-group">
            <label class="form-label">Tài xế</label>
            <input type="text" th:field="*{driverName}" class="form-control" placeholder="Nguyễn Văn A"/>
          </div>
          <div class="form-group">
            <label class="form-label">SĐT tài xế</label>
            <input type="tel" th:field="*{driverPhone}" class="form-control" placeholder="0912345678"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Tiện ích</label>
          <input type="text" th:field="*{amenities}" class="form-control" placeholder="WiFi, Điều hoà, USB sạc"/>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-modal-close="addBusModal">Hủy</button>
        <button type="submit" class="btn btn-primary">🚌 Thêm xe</button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{common/layout :: confirmModal}"></div>
<script th:src="@{/js/app.js}"></script>
<div th:if="${formError}" id="autoOpenModal" style="display:none"></div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('autoOpenModal')) Modal.open('addBusModal');
  });
</script>
</body>
</html>
