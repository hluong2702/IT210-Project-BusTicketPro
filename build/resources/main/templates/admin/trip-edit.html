<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sửa chuyến xe — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{common/layout :: sidebar('trips')}"></div>
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>
  <div class="main-content">
    <div class="topbar">
      <button id="sidebarToggle" class="sidebar-toggle">☰</button>
      <span class="topbar-title">✏️ Sửa chuyến xe</span>
      <div class="topbar-actions">
        <a th:href="@{/admin/trips}" class="btn btn-ghost btn-sm">← Quay lại</a>
      </div>
    </div>
    <div class="page-content" style="max-width:640px">
      <div class="card">
        <div class="card-header">🗓️ Sửa chuyến xe #<span th:text="${trip.id}">1</span></div>
        <div class="card-body">
          <form th:action="@{/admin/trips/{id}/edit(id=${trip.id})}" th:object="${tripRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="grid-2" style="gap:14px">
              <div class="form-group">
                 <label class="form-label">Tuyến đường *</label>
                 <select th:field="*{routeId}" class="form-control">
                   <option th:each="route : ${routes}"
                           th:value="${route.id}"
                           th:text="${route.departureLocation.name + ' → ' + route.arrivalLocation.name}">Tuyến</option>
                 </select>
               </div>
               <div class="form-group">
                 <label class="form-label">Xe *</label>
                 <select th:field="*{busId}" class="form-control">
                   <option th:each="bus : ${buses}"
                           th:value="${bus.id}"
                           th:text="${bus.licensePlate + ' - ' + bus.busType.displayName}">Xe</option>
                 </select>
               </div>
               <div class="form-group">
                 <label class="form-label">Giờ khởi hành *</label>
                 <input type="datetime-local" th:field="*{departureTime}" class="form-control"/>
               </div>
               <div class="form-group">
                 <label class="form-label">Giờ đến *</label>
                 <input type="datetime-local" th:field="*{arrivalTime}" class="form-control"/>
               </div>
               <div class="form-group" style="grid-column:1/-1">
                 <label class="form-label">Giá vé (VNĐ) *</label>
                 <input type="number" th:field="*{price}" class="form-control" min="1000"/>
               </div>
            </div>
            <div style="display:flex;gap:10px;margin-top:8px">
              <button type="submit" class="btn btn-primary">💾 Lưu thay đổi</button>
              <a th:href="@{/admin/trips}" class="btn btn-ghost">Hủy</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
