<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Quản lý chuyến xe — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{common/layout :: sidebar('trips')}"></div>
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <div class="main-content">
    <div class="topbar">
      <button id="sidebarToggle" class="sidebar-toggle">☰</button>
      <span class="topbar-title">🗓️ Quản lý chuyến xe</span>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" data-modal-open="addTripModal">+ Thêm chuyến</button>
      </div>
    </div>

    <div class="page-content">
      <div th:if="${success}" class="alert alert-success" data-auto-dismiss="4000" style="margin-bottom:16px">
        ✅ <span th:text="${success}">Thành công</span>
      </div>
      <div th:if="${error}" class="alert alert-danger" data-auto-dismiss="5000" style="margin-bottom:16px">
        ❌ <span th:text="${error}">Lỗi</span>
      </div>

      <div class="card">
        <div class="card-header">
          <span>Danh sách chuyến xe (<span th:text="${#lists.size(trips)}">0</span>)</span>
          <input type="text" class="form-control" style="max-width:200px" placeholder="🔍 Tìm..." data-table-search="tripTable"/>
        </div>
        <div class="card-body" style="padding:0">
          <div th:if="${#lists.isEmpty(trips)}" class="empty-state">
            <div class="icon">🗓️</div>
            <h3>Chưa có chuyến xe</h3>
          </div>
          <div th:unless="${#lists.isEmpty(trips)}" class="table-wrapper">
            <table class="table" id="tripTable">
              <thead>
                <tr>
                  <th>Tuyến đường</th>
                  <th>Khởi hành</th>
                  <th>Đến nơi</th>
                  <th>Xe</th>
                  <th>Giá vé</th>
                  <th>Trạng thái</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="trip : ${trips}">
                  <td>
                    <strong th:text="${trip.route.departureLocation.name}">HN</strong>
                    <span style="color:var(--text-muted)"> → </span>
                    <strong th:text="${trip.route.arrivalLocation.name}">HCM</strong>
                  </td>
                  <td th:text="${#temporals.format(trip.departureTime,'HH:mm dd/MM/yyyy')}">06:00</td>
                  <td th:text="${#temporals.format(trip.arrivalTime,'HH:mm dd/MM/yyyy')}">18:00</td>
                  <td>
                    <span th:text="${trip.bus.licensePlate}">51B</span><br/>
                    <span style="font-size:.75rem;color:var(--text-muted)" th:text="${trip.bus.busType.displayName}">Loại</span>
                  </td>
                  <td style="color:var(--primary);font-weight:700"
                      th:text="${#numbers.formatDecimal(trip.price,0,'COMMA',0,'POINT')} + ' đ'">450k</td>
                  <td>
                    <span th:if="${trip.active}" class="badge badge-paid">✅ Hoạt động</span>
                    <span th:unless="${trip.active}" class="badge badge-cancelled">❌ Đã hủy</span>
                  </td>
                  <td style="white-space:nowrap">
                    <a th:href="@{/admin/trips/{id}/edit(id=${trip.id})}" class="btn btn-ghost btn-sm">✏️ Sửa</a>
                    <button class="btn btn-danger btn-sm"
                            th:onclick="|deleteItem('/admin/trips/${trip.id}/delete', 'Hủy chuyến xe này?')|">
                      🗑️
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Trip Modal -->
<div id="addTripModal" class="modal-overlay">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <div class="modal-title">🗓️ Thêm chuyến xe mới</div>
      <button class="modal-close" data-modal-close="addTripModal">×</button>
    </div>
    <form th:action="@{/admin/trips}" th:object="${tripRequest}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="modal-body">
        <div class="grid-2" style="gap:14px">
          <div class="form-group">
             <label class="form-label">Tuyến đường *</label>
             <select th:field="*{routeId}" class="form-control">
               <option value="">-- Chọn tuyến --</option>
               <option th:each="route : ${routes}"
                       th:value="${route.id}"
                       th:text="${route.departureLocation.name + ' → ' + route.arrivalLocation.name}">Tuyến</option>
             </select>
           </div>
           <div class="form-group">
             <label class="form-label">Xe *</label>
             <select th:field="*{busId}" class="form-control">
               <option value="">-- Chọn xe --</option>
               <option th:each="bus : ${buses}"
                       th:value="${bus.id}"
                       th:text="${bus.licensePlate + ' - ' + bus.busType.displayName}">Xe</option>
             </select>
           </div>
           <div class="form-group">
             <label class="form-label">Giờ khởi hành *</label>
             <input type="datetime-local" th:field="*{departureTime}" class="form-control"/>
           </div>
           <div class="form-group">
             <label class="form-label">Giờ đến *</label>
             <input type="datetime-local" th:field="*{arrivalTime}" class="form-control"/>
           </div>
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Giá vé (VNĐ) *</label>
             <input type="number" th:field="*{price}" class="form-control" min="1000" step="1000" placeholder="450000"/>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-modal-close="addTripModal">Hủy</button>
        <button type="submit" class="btn btn-primary">🗓️ Thêm chuyến</button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{common/layout :: confirmModal}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
