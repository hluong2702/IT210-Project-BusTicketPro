<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Quản lý vé — BusTicketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{common/layout :: sidebar('tickets')}"></div>
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <div class="main-content">
    <div class="topbar">
      <button id="sidebarToggle" class="sidebar-toggle">☰</button>
      <span class="topbar-title">🎫 Danh sách vé</span>
    </div>

    <div class="page-content">
      <!-- Filter -->
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
        <a th:href="@{/staff/tickets}" class="btn btn-sm"
           th:classappend="${filterStatus == null} ? ' btn-primary' : ' btn-ghost'">Tất cả</a>
        <a th:href="@{/staff/tickets(status=PENDING)}" class="btn btn-sm"
           th:classappend="${filterStatus == 'PENDING'} ? ' btn-primary' : ' btn-ghost'">⏳ Chờ TT</a>
        <a th:href="@{/staff/tickets(status=PAID)}" class="btn btn-sm"
           th:classappend="${filterStatus == 'PAID'} ? ' btn-success' : ' btn-ghost'">✅ Đã TT</a>
        <a th:href="@{/staff/tickets(status=CANCELLED)}" class="btn btn-sm"
           th:classappend="${filterStatus == 'CANCELLED'} ? ' btn-danger' : ' btn-ghost'">❌ Đã hủy</a>
        <input type="text" class="form-control" style="max-width:220px;margin-left:auto"
               placeholder="🔍 Tìm kiếm..." data-table-search="ticketTable"/>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0">
          <div th:if="${#lists.isEmpty(tickets)}" class="empty-state">
            <div class="icon">🎫</div>
            <h3>Không có vé nào</h3>
          </div>
          <div th:unless="${#lists.isEmpty(tickets)}" class="table-wrapper">
            <table class="table" id="ticketTable">
              <thead>
                <tr>
                  <th>Mã vé</th>
                  <th>Hành khách</th>
                  <th>SĐT</th>
                  <th>Tuyến đường</th>
                  <th>Khởi hành</th>
                  <th>Ghế</th>
                  <th>Số tiền</th>
                  <th>Đặt lúc</th>
                  <th>Trạng thái</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="ticket : ${tickets}">
                  <td><code style="font-size:.8rem" th:text="${ticket.ticketCode}">BTP</code></td>
                  <td th:text="${ticket.passengerName}">Nguyễn A</td>
                  <td th:text="${ticket.passengerPhone}">0912</td>
                  <td>
                    <span th:text="${ticket.departureName}">HN</span>
                    <span style="color:var(--text-muted)"> → </span>
                    <span th:text="${ticket.arrivalName}">HCM</span>
                  </td>
                  <td th:text="${#temporals.format(ticket.departureTime,'HH:mm dd/MM/yy')}">06:00</td>
                  <td><strong th:text="${ticket.seatNumber}">A1</strong></td>
                  <td style="color:var(--primary);font-weight:600"
                      th:text="${#numbers.formatDecimal(ticket.totalAmount,0,'COMMA',0,'POINT')} + ' đ'">450k</td>
                  <td th:text="${#temporals.format(ticket.bookedAt,'HH:mm dd/MM')}">07:00</td>
                  <td>
                    <span th:if="${ticket.status.name()=='PENDING'}"  class="badge badge-pending">⏳ Chờ TT</span>
                    <span th:if="${ticket.status.name()=='PAID'}"     class="badge badge-paid">✅ Đã TT</span>
                    <span th:if="${ticket.status.name()=='CANCELLED'}"class="badge badge-cancelled">❌ Đã hủy</span>
                  </td>
                  <td style="white-space:nowrap">
                    <button th:if="${ticket.status.name()=='PENDING'}"
                            class="btn btn-success btn-sm"
                            th:onclick="|confirmPayment(${ticket.id}, '/staff/ticket/${ticket.id}/confirm')|">
                      ✅ Xác nhận
                    </button>
                    <button th:if="${ticket.status.name()=='PENDING'}"
                            class="btn btn-danger btn-sm"
                            th:onclick="|cancelTicket(${ticket.id}, '/staff/ticket/${ticket.id}/cancel')|">
                      ❌ Hủy
                    </button>
                    <span th:if="${ticket.status.name()!='PENDING'}" style="color:var(--text-muted);font-size:.8rem">—</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{common/layout :: confirmModal}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
