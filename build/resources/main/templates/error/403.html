<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>403 — Không có quyền truy cập</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body style="background:linear-gradient(135deg,#1e1b4b,#312e81);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
<div style="text-align:center;color:#fff;max-width:480px">
  <div style="font-size:6rem;margin-bottom:16px">🚫</div>
  <h1 style="font-size:5rem;font-weight:800;opacity:.9;margin-bottom:8px">403</h1>
  <h2 style="font-size:1.4rem;margin-bottom:12px">Không có quyền truy cập</h2>
  <p style="opacity:.8;margin-bottom:32px" th:text="${message}">Bạn không có quyền xem trang này.</p>
  <div style="display:flex;gap:12px;justify-content:center">
    <a th:href="@{/}" class="btn btn-primary">🏠 Trang chủ</a>
    <a th:href="@{/auth/login}" class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.4)">🔑 Đăng nhập</a>
  </div>
</div>
</body>
</html>
